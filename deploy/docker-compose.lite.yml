services:
  postgres: {image: postgres:16, environment: {POSTGRES_PASSWORD: postgres, POSTGRES_DB: hypercompute}, ports:["5432:5432"]}
  redis: {image: redis:7, ports:["6379:6379"]}
  gateway: {build: {context: .., dockerfile: gateway/Dockerfile}, ports:["8080:8080"]}
  scheduler: {build: {context: .., dockerfile: scheduler/Dockerfile}, ports:["8081:8081"]}
  wallet: {build: {context: .., dockerfile: wallet/Dockerfile}, ports:["8082:8082"]}
  billing: {build: {context: .., dockerfile: billing/Dockerfile}, ports:["8083:8083"]}
